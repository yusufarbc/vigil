# ILM policy for security logs: 14-day hot tier → snapshot to GCS → delete (ADR-009, ADR-010)
# Apply via Kibana Dev Tools or bootstrap job:
#   PUT _ilm/policy/sentinel-logs-policy
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-ilm-policy
  namespace: sentinel
data:
  policy.json: |
    {
      "policy": {
        "phases": {
          "hot": {
            "min_age": "0ms",
            "actions": {
              "rollover": {
                "max_age": "1d",
                "max_primary_shard_size": "20gb"
              },
              "set_priority": { "priority": 100 }
            }
          },
          "warm": {
            "min_age": "7d",
            "actions": {
              "set_priority": { "priority": 50 },
              "readonly": {}
            }
          },
          "cold": {
            "min_age": "14d",
            "actions": {
              "set_priority": { "priority": 0 }
            }
          },
          "delete": {
            "min_age": "14d",
            "actions": {
              "wait_for_snapshot": {
                "policy": "sentinel-gcs-snapshot-policy"
              },
              "delete": {}
            }
          }
        }
      }
    }
