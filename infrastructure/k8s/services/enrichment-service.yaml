apiVersion: v1
kind: ServiceAccount
metadata:
  name: enrichment-service-sa
  namespace: sentinel
  annotations:
    iam.gke.io/gcp-service-account: sentinel-enrichment@${GCP_PROJECT}.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enrichment-service
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enrichment-service
  template:
    metadata:
      labels:
        app: enrichment-service
    spec:
      serviceAccountName: enrichment-service-sa
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: enrichment-service
          image: us-central1-docker.pkg.dev/${GCP_PROJECT}/sentinel/enrichment-service:${IMAGE_TAG}
          envFrom:
            - configMapRef:
                name: sentinel-config
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: enrichment-service-hpa
  namespace: sentinel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: enrichment-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
