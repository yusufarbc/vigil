apiVersion: v1
kind: ServiceAccount
metadata:
  name: alert-gateway-sa
  namespace: sentinel
  annotations:
    iam.gke.io/gcp-service-account: sentinel-alert-gateway@${GCP_PROJECT}.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-gateway
  namespace: sentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alert-gateway
  template:
    metadata:
      labels:
        app: alert-gateway
    spec:
      serviceAccountName: alert-gateway-sa
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alert-gateway
          image: us-central1-docker.pkg.dev/${GCP_PROJECT}/sentinel/alert-gateway:${IMAGE_TAG}
          envFrom:
            - configMapRef:
                name: sentinel-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alert-gateway-hpa
  namespace: sentinel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alert-gateway
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
