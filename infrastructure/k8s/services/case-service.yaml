apiVersion: v1
kind: ServiceAccount
metadata:
  name: case-service-sa
  namespace: sentinel
  annotations:
    iam.gke.io/gcp-service-account: sentinel-case@${GCP_PROJECT}.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: case-service
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: case-service
  template:
    metadata:
      labels:
        app: case-service
    spec:
      serviceAccountName: case-service-sa
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: case-service
          image: us-central1-docker.pkg.dev/${GCP_PROJECT}/sentinel/case-service:${IMAGE_TAG}
          envFrom:
            - configMapRef:
                name: sentinel-config
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-es-elastic-user
                  key: elastic
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: es-certs
              mountPath: /etc/sentinel/certs
              readOnly: true
      volumes:
        - name: es-certs
          secret:
            secretName: sentinel-es-http-certs-public
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: case-service-hpa
  namespace: sentinel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: case-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
