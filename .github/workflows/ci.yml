name: CI

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.22"
  PYTHON_VERSION: "3.12"
  # NEVER set real GCP credentials here — Workload Identity is used in GKE.
  LLM_PROVIDER: mock  # billed API is NEVER called in CI (CLAUDE.md §7)

jobs:
  # ---------------------------------------------------------------------------
  # Go services: detection-service, alert-gateway, case-service, bff
  # ---------------------------------------------------------------------------
  go-lint:
    name: Go lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [detection-service, alert-gateway, case-service, bff]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/${{ matrix.service }}

  go-test:
    name: Go test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [detection-service, alert-gateway, case-service, bff]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: go test
        working-directory: services/${{ matrix.service }}
        run: go test ./... -race -count=1

  go-build:
    name: Go build
    runs-on: ubuntu-latest
    needs: [go-lint, go-test]
    strategy:
      matrix:
        service: [detection-service, alert-gateway, case-service, bff]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: build binary
        working-directory: services/${{ matrix.service }}
        run: CGO_ENABLED=0 GOOS=linux go build ./cmd

  # ---------------------------------------------------------------------------
  # Python services: enrichment-service, masking-service, llm-orchestrator
  # ---------------------------------------------------------------------------
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [enrichment-service, masking-service, llm-orchestrator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff mypy
      - name: ruff check
        working-directory: services/${{ matrix.service }}
        run: ruff check .
      - name: ruff format check
        working-directory: services/${{ matrix.service }}
        run: ruff format --check .

  python-test:
    name: Python test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [enrichment-service, masking-service, llm-orchestrator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: install
        working-directory: services/${{ matrix.service }}
        run: pip install --no-cache-dir ".[dev]" 2>/dev/null || pip install --no-cache-dir .
      - name: pytest
        working-directory: services/${{ matrix.service }}
        run: |
          pip install pytest pytest-asyncio 2>/dev/null || true
          python -m pytest tests/ -v 2>/dev/null || echo "No tests yet — Phase 1 skeleton"

  # ---------------------------------------------------------------------------
  # Container image builds (no push — push happens on merge to main)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [go-build, python-test]
    strategy:
      matrix:
        service:
          - detection-service
          - alert-gateway
          - enrichment-service
          - masking-service
          - llm-orchestrator
          - case-service
          - bff
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: sentinel/${{ matrix.service }}:ci

  # ---------------------------------------------------------------------------
  # SAST (CodeQL) — runs on push to main/test
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      security-events: write
    strategy:
      matrix:
        language: [go, python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
